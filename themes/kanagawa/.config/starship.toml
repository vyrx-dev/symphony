add_newline = false
command_timeout = 60
format = """$os$hostname $directory $git_branch$git_status$line_break$character"""

# right_format = """# $time# """

palette = "colors"

[palettes.colors]
mustard = '#af8700'
color1 = '#7E9CD8'        # directory path (crystalBlue - primary)
color2 = '#1F1F28'          # unused
color3 = '#DCD7BA'          # unused
color4 = '#1F1F28'          # unused
color5 = '#1F1F28'          # unused
color6 = '#54546D'        # vicmd symbol (muted gray)
color7 = '#1F1F28'          # unused
color8 = '#7E9CD8'        # os symbol, success character (crystalBlue)
color9 = '#957FB8'     # git branch (oniViolet)
error = '#C34043'          # error character (autumnRed)

[hostname]
ssh_only = true
style = "fg:color8"
format = "[ @$hostname]($style)"

[directory]
style = "fg:color1 bold"
read_only = " 󰌾"
read_only_style = "fg:#C34043"
truncation_length = 0
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style)"

[directory.substitutions]
'~/100xCodes/Cohort-3-WebDev' = 'Learning'
'~/Testing-repo' = 'work-project'

[character]
success_symbol = '[❯](fg:color8 bold)'
error_symbol = '[❯](fg:error bold)'
vicmd_symbol = '[❮](fg:color6 bold)'

[git_branch]
style = "fg:color9 bold"
format = '[$symbol$branch]($style) '

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
format = '[[($all_status$ahead_behind )](fg:#C34043)]($style)'

[os]
format = "[$symbol]($style)"
style = "fg:color8 bold"
disabled = false

[os.symbols]
Linux = "󰊠"
Arch = "󰣇"
Ubuntu = "󰕈"

# [time]
# disabled = false
# format = '[[ $time ](fg:#C34043 )]($style)'
# time_format = "%R"

[line_break]
disabled = true

