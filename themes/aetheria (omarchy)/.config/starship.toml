# Theme: Omarchy aetheria (omarchy)

add_newline = false
command_timeout = 60
format = "$os$hostname $directory $git_branch$git_status$line_break$character"
palette = "theme"

[palettes.theme]
accent = '#BE3F50'
cyan = '#FF7F41'
dim = '#c53253'
purple = '#9147a8'
error = '#c8e967'

[hostname]
ssh_only = true
style = "fg:accent"
format = "[ @$hostname]($style)"

[directory]
style = "fg:cyan bold"
read_only = " 󰌾"
read_only_style = "fg:error"
truncation_length = 0
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style)"

[character]
success_symbol = '[❯](fg:accent bold)'
error_symbol = '[❯](fg:error bold)'
vicmd_symbol = '[❮](fg:dim bold)'

[git_branch]
style = "fg:purple bold"
format = '[$symbol$branch]($style) '

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
format = '[[$all_status$ahead_behind ](fg:error)]($style)'

[os]
format = "[$symbol]($style)"
style = "fg:accent bold"
disabled = false

[os.symbols]
Linux = "󰊠"
Arch = "󰣇"
Ubuntu = "󰕈"

[line_break]
disabled = true
