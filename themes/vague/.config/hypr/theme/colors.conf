# Symphony by vyrx
# Theme: Vague
# https://github.com/vyrx-dev

$activeBorderColor = rgba(aeaed1aa)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# Border colors
$secondary = $activeBorderColor
$outline_variant = rgba(252530ff)

# Shadow configuration
decoration {
    shadow {
        color = rgba(18, 19, 20, 0.5)
        color_inactive = rgba(18, 19, 20, 0.3)
        offset = 2 2
        range = 20
        render_power = 3
    }
}
