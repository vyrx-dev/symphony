add_newline = false
command_timeout = 60
format = """$os$hostname $directory $git_branch$git_status$line_break$character"""

palette = "colors"

[palettes.colors]
mustard = '#d8a078'
color1 = '#e8b89a'        # directory path (warm peach)
color2 = '#1a1513'
color3 = '#f0e4dc'
color4 = '#1a1513'
color5 = '#1a1513'
color6 = '#c8a898'        # vicmd symbol (warm taupe)
color7 = '#1a1513'
color8 = '#c8b888'        # os symbol, success character (warm olive)
color9 = '#d8a8a0'        # git branch (dusty rose)
error = '#e8a090'         # error character (warm terracotta)

[hostname]
ssh_only = true
style = "fg:color8"
format = "[ @$hostname]($style)"

[directory]
style = "fg:color1 bold"
read_only = " 󰌾"
read_only_style = "fg:#e8a090"
truncation_length = 0
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style)"

[directory.substitutions]
'~/100xCodes/Cohort-3-WebDev' = 'Learning'
'~/Testing-repo' = 'work-project'

[character]
success_symbol = '[❯](fg:color8 bold)'
error_symbol = '[❯](fg:error bold)'
vicmd_symbol = '[❮](fg:color6 bold)'

[git_branch]
style = "fg:color9 bold"
format = '[$symbol$branch]($style) '

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
format = '[[($all_status$ahead_behind )](fg:#e8a090)]($style)'

[os]
format = "[$symbol]($style)"
style = "fg:color8 bold"
disabled = false

[os.symbols]
Linux = "󰊠"
Arch = "󰣇"
Ubuntu = "󰕈"

[line_break]
disabled = true
