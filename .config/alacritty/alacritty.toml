# Colors from Symphony
general.import = ["~/.config/symphony/current/.config/alacritty/colors.toml"]

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 1
# dynamic_padding = true
decorations = "None"
opacity = 0.90

[font]
normal = { family = "CaskaydiaMono Nerd Font" }
bold = { family = "CaskaydiaMono Nerd Font" }
italic = { family = "CaskaydiaMono Nerd Font" }
size = 12

